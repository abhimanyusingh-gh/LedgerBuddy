services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: invoice-processor-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      mailhog-oauth:
        condition: service_started
    env_file:
      - path: ./backend/.env.example
        required: true
      - path: ./backend/.env
        required: false
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ENV: ${ENV:-local}
      NODE_ENV: development
      PORT: "4000"
      MONGO_URI: mongodb://mongo:27017/invoice_processor
      APP_MANIFEST_PATH: ${APP_MANIFEST_PATH:-}
      INGESTION_SOURCES: ${INGESTION_SOURCES:-folder}
      FOLDER_SOURCE_KEY: local-folder
      FOLDER_SOURCE_PATH: /app/sample-invoices/inbox
      FOLDER_RECURSIVE: "false"
      EMAIL_SOURCE_KEY: ${EMAIL_SOURCE_KEY:-email-inbox}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-imap}
      EMAIL_MAILHOG_API_BASE_URL: ${EMAIL_MAILHOG_API_BASE_URL:-http://mailhog-oauth:8026}
      EMAIL_HOST: ${EMAIL_HOST:-imap.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-993}
      EMAIL_SECURE: ${EMAIL_SECURE:-true}
      EMAIL_USERNAME: ${EMAIL_USERNAME:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_AUTH_MODE: ${EMAIL_AUTH_MODE:-password}
      EMAIL_OAUTH_CLIENT_ID: ${EMAIL_OAUTH_CLIENT_ID:-}
      EMAIL_OAUTH_CLIENT_SECRET: ${EMAIL_OAUTH_CLIENT_SECRET:-}
      EMAIL_OAUTH_REFRESH_TOKEN: ${EMAIL_OAUTH_REFRESH_TOKEN:-}
      EMAIL_OAUTH_ACCESS_TOKEN: ${EMAIL_OAUTH_ACCESS_TOKEN:-}
      EMAIL_OAUTH_TOKEN_ENDPOINT: ${EMAIL_OAUTH_TOKEN_ENDPOINT:-https://oauth2.googleapis.com/token}
      EMAIL_SIMULATION_SAMPLE_DIR: ${EMAIL_SIMULATION_SAMPLE_DIR:-/app/sample-invoices/inbox}
      EMAIL_MAILBOX: ${EMAIL_MAILBOX:-INBOX}
      EMAIL_FROM_FILTER: ${EMAIL_FROM_FILTER:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-http://host.docker.internal:8000/v1}
      DEEPSEEK_OCR_MODEL: ${DEEPSEEK_OCR_MODEL:-mlx-community/DeepSeek-OCR-4bit}
      DEEPSEEK_OCR_MAX_TOKENS: "768"
      DEEPSEEK_TIMEOUT_MS: "3600000"
      OCR_HIGH_CONFIDENCE_THRESHOLD: "0.92"
      FIELD_VERIFIER_PROVIDER: http
      FIELD_VERIFIER_BASE_URL: ${FIELD_VERIFIER_BASE_URL:-http://host.docker.internal:8100/v1}
      FIELD_VERIFIER_TIMEOUT_MS: "20000"
      LOCAL_FILE_STORE_ROOT: ${LOCAL_FILE_STORE_ROOT:-/app/.local-run/artifacts}
      S3_FILE_STORE_BUCKET: ${S3_FILE_STORE_BUCKET:-}
      S3_FILE_STORE_REGION: ${S3_FILE_STORE_REGION:-us-east-1}
      S3_FILE_STORE_PREFIX: ${S3_FILE_STORE_PREFIX:-invoice-processor}
      S3_FILE_STORE_ENDPOINT: ${S3_FILE_STORE_ENDPOINT:-}
      S3_FILE_STORE_FORCE_PATH_STYLE: ${S3_FILE_STORE_FORCE_PATH_STYLE:-false}
      CONFIDENCE_EXPECTED_MAX_TOTAL: "100000"
      CONFIDENCE_EXPECTED_MAX_DUE_DAYS: "90"
      CONFIDENCE_AUTO_SELECT_MIN: "91"
      TALLY_ENDPOINT: http://tally.example.local
      TALLY_COMPANY: Demo Company
      TALLY_PURCHASE_LEDGER: Purchase
    volumes:
      - ${INVOICE_INBOX_PATH:-./sample-invoices/inbox}:/app/sample-invoices/inbox:ro
      - ./.local-run/artifacts:/app/.local-run/artifacts

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000/api
    container_name: invoice-processor-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  mongo:
    image: mongo:7
    container_name: invoice-processor-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: invoice_processor
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    container_name: invoice-processor-mongo-express
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH: "false"

  mailhog:
    image: mailhog/mailhog:latest
    container_name: invoice-processor-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  mailhog-oauth:
    build:
      context: .
      dockerfile: mailhog-oauth-wrapper/Dockerfile
    container_name: invoice-processor-mailhog-oauth
    restart: unless-stopped
    depends_on:
      - mailhog
    ports:
      - "8026:8026"
    environment:
      PORT: "8026"
      MAILHOG_BASE_URL: http://mailhog:8025
      MAILHOG_SMTP_HOST: mailhog
      MAILHOG_SMTP_PORT: "1025"
      OAUTH_CLIENT_ID: ${EMAIL_OAUTH_CLIENT_ID:-mailhog-client}
      OAUTH_CLIENT_SECRET: ${EMAIL_OAUTH_CLIENT_SECRET:-mailhog-secret}
      OAUTH_REFRESH_TOKEN: ${EMAIL_OAUTH_REFRESH_TOKEN:-mailhog-refresh}
      OAUTH_ACCESS_TOKEN: ${EMAIL_OAUTH_ACCESS_TOKEN:-mailhog-access-token}
      OAUTH_XOAUTH2_USERNAME: ${EMAIL_USERNAME:-ap@example.com}
      OAUTH_TOKEN_EXPIRES_IN: "3600"

volumes:
  mongo_data:
