name: billforge

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: billforge-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      mailhog-oauth:
        condition: service_started
      keycloak:
        condition: service_healthy
      minio:
        condition: service_healthy
      invoice-ocr:
        condition: service_healthy
      invoice-slm:
        condition: service_healthy
    env_file:
      - path: ./backend/.env.example
        required: true
      - path: ./backend/.env
        required: false
    ports:
      - "4100:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      ENV: ${ENV:-local}
      NODE_ENV: development
      PORT: "4000"
      MONGO_URI: mongodb://billforge_app:billforge_local_pass@mongo:27017/billforge?authSource=billforge
      APP_MANIFEST_PATH: ${APP_MANIFEST_PATH:-}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5177}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-billforge-app}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-billforge-local-secret}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email offline_access}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:5177/api/auth/callback}
      OIDC_AUTH_URL: ${OIDC_AUTH_URL:-http://localhost:8280/realms/billforge/protocol/openid-connect/auth}
      OIDC_TOKEN_URL: ${OIDC_TOKEN_URL:-http://keycloak:8080/realms/billforge/protocol/openid-connect/token}
      OIDC_VALIDATE_URL: ${OIDC_VALIDATE_URL:-http://keycloak:8080/realms/billforge/protocol/openid-connect/token/introspect}
      OIDC_USERINFO_URL: ${OIDC_USERINFO_URL:-http://keycloak:8080/realms/billforge/protocol/openid-connect/userinfo}
      KEYCLOAK_INTERNAL_BASE_URL: ${KEYCLOAK_INTERNAL_BASE_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-billforge}
      AUTH_STATE_TTL_SECONDS: ${AUTH_STATE_TTL_SECONDS:-600}
      APP_SESSION_SIGNING_SECRET: ${APP_SESSION_SIGNING_SECRET:-local-dev-session-signing-secret-change-me}
      APP_SESSION_TTL_SECONDS: ${APP_SESSION_TTL_SECONDS:-28800}
      REFRESH_TOKEN_ENCRYPTION_SECRET: ${REFRESH_TOKEN_ENCRYPTION_SECRET:-local-dev-refresh-token-secret-32-chars}
      AUTH_AUTO_PROVISION_USERS: ${AUTH_AUTO_PROVISION_USERS:-true}
      PLATFORM_ADMIN_EMAILS: ${PLATFORM_ADMIN_EMAILS:-platform-admin@local.test}
      LOCAL_DEMO_SEED: ${LOCAL_DEMO_SEED:-true}
      LOCAL_DEMO_CONFIG_PATH: ${LOCAL_DEMO_CONFIG_PATH:-config/local-demo-users.json}
      INGESTION_SOURCES: ${INGESTION_SOURCES:-folder}
      FOLDER_SOURCE_KEY: local-folder
      FOLDER_SOURCE_PATH: /app/sample-invoices/inbox
      FOLDER_RECURSIVE: "false"
      EMAIL_SOURCE_KEY: ${EMAIL_SOURCE_KEY:-email-inbox}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-imap}
      EMAIL_MAILHOG_API_BASE_URL: ${EMAIL_MAILHOG_API_BASE_URL:-http://mailhog-oauth:8026}
      EMAIL_HOST: ${EMAIL_HOST:-mailhog-oauth}
      EMAIL_PORT: ${EMAIL_PORT:-1143}
      EMAIL_SECURE: ${EMAIL_SECURE:-false}
      EMAIL_USERNAME: ${EMAIL_USERNAME:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_AUTH_MODE: ${EMAIL_AUTH_MODE:-password}
      EMAIL_OAUTH_CLIENT_ID: ${EMAIL_OAUTH_CLIENT_ID:-}
      EMAIL_OAUTH_CLIENT_SECRET: ${EMAIL_OAUTH_CLIENT_SECRET:-}
      EMAIL_OAUTH_REFRESH_TOKEN: ${EMAIL_OAUTH_REFRESH_TOKEN:-}
      EMAIL_OAUTH_ACCESS_TOKEN: ${EMAIL_OAUTH_ACCESS_TOKEN:-}
      EMAIL_OAUTH_TOKEN_ENDPOINT: ${EMAIL_OAUTH_TOKEN_ENDPOINT:-http://keycloak:8080/realms/billforge/protocol/openid-connect/token}
      EMAIL_SIMULATION_SAMPLE_DIR: ${EMAIL_SIMULATION_SAMPLE_DIR:-/app/sample-invoices/inbox}
      EMAIL_MAILBOX: ${EMAIL_MAILBOX:-INBOX}
      EMAIL_FROM_FILTER: ${EMAIL_FROM_FILTER:-}
      GMAIL_OAUTH_CLIENT_ID: ${GMAIL_OAUTH_CLIENT_ID:-billforge-app}
      GMAIL_OAUTH_CLIENT_SECRET: ${GMAIL_OAUTH_CLIENT_SECRET:-billforge-local-secret}
      GMAIL_OAUTH_REDIRECT_URI: ${GMAIL_OAUTH_REDIRECT_URI:-http://localhost:4100/api/connect/gmail/callback}
      GMAIL_OAUTH_AUTH_URL: ${GMAIL_OAUTH_AUTH_URL:-https://accounts.google.com/o/oauth2/v2/auth}
      GMAIL_OAUTH_TOKEN_URL: ${GMAIL_OAUTH_TOKEN_URL:-https://oauth2.googleapis.com/token}
      GMAIL_OAUTH_USERINFO_URL: ${GMAIL_OAUTH_USERINFO_URL:-https://www.googleapis.com/oauth2/v3/userinfo}
      GMAIL_OAUTH_SCOPES: ${GMAIL_OAUTH_SCOPES:-openid email profile offline_access}
      GMAIL_OAUTH_STATE_TTL_SECONDS: ${GMAIL_OAUTH_STATE_TTL_SECONDS:-600}
      GMAIL_OAUTH_HTTP_TIMEOUT_MS: ${GMAIL_OAUTH_HTTP_TIMEOUT_MS:-15000}
      GMAIL_OAUTH_TOKEN_ENCRYPTION_SECRET: ${GMAIL_OAUTH_TOKEN_ENCRYPTION_SECRET:-local-dev-gmail-oauth-encryption-secret}
      GMAIL_OAUTH_SUCCESS_REDIRECT_URL: ${GMAIL_OAUTH_SUCCESS_REDIRECT_URL:-http://localhost:5177}
      GMAIL_OAUTH_FAILURE_REDIRECT_URL: ${GMAIL_OAUTH_FAILURE_REDIRECT_URL:-http://localhost:5177}
      DEEPSEEK_BASE_URL: http://invoice-ocr:8000/v1
      DEEPSEEK_OCR_MODEL: ${DEEPSEEK_OCR_MODEL:-mlx-community/DeepSeek-OCR-4bit}
      DEEPSEEK_OCR_MAX_TOKENS: "768"
      DEEPSEEK_TIMEOUT_MS: "3600000"
      OCR_HIGH_CONFIDENCE_THRESHOLD: "0.92"
      FIELD_VERIFIER_PROVIDER: http
      FIELD_VERIFIER_BASE_URL: http://invoice-slm:8100/v1
      FIELD_VERIFIER_TIMEOUT_MS: "20000"
      LOCAL_FILE_STORE_ROOT: ${LOCAL_FILE_STORE_ROOT:-/app/.local-run/artifacts}
      S3_FILE_STORE_BUCKET: ${S3_FILE_STORE_BUCKET:-billforge-local}
      S3_FILE_STORE_REGION: ${S3_FILE_STORE_REGION:-us-east-1}
      S3_FILE_STORE_PREFIX: ${S3_FILE_STORE_PREFIX:-billforge}
      S3_FILE_STORE_ENDPOINT: ${S3_FILE_STORE_ENDPOINT:-http://minio:9000}
      S3_FILE_STORE_FORCE_PATH_STYLE: ${S3_FILE_STORE_FORCE_PATH_STYLE:-true}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      CONFIDENCE_EXPECTED_MAX_TOTAL: "100000"
      CONFIDENCE_EXPECTED_MAX_DUE_DAYS: "90"
      CONFIDENCE_AUTO_SELECT_MIN: "91"
      LLM_ASSIST_CONFIDENCE_THRESHOLD: ${LLM_ASSIST_CONFIDENCE_THRESHOLD:-85}
      TALLY_ENDPOINT: http://tally.example.local
      TALLY_COMPANY: Demo Company
      TALLY_PURCHASE_LEDGER: Purchase
      TALLY_CGST_LEDGER: ${TALLY_CGST_LEDGER:-Input CGST}
      TALLY_SGST_LEDGER: ${TALLY_SGST_LEDGER:-Input SGST}
      TALLY_IGST_LEDGER: ${TALLY_IGST_LEDGER:-Input IGST}
      TALLY_CESS_LEDGER: ${TALLY_CESS_LEDGER:-Input Cess}
      INVITE_EMAIL_PROVIDER: ${INVITE_EMAIL_PROVIDER:-sendgrid}
      INVITE_SMTP_HOST: ${INVITE_SMTP_HOST:-mailhog}
      INVITE_SMTP_PORT: ${INVITE_SMTP_PORT:-1025}
      INVITE_SMTP_SECURE: ${INVITE_SMTP_SECURE:-false}
      INVITE_SMTP_USERNAME: ${INVITE_SMTP_USERNAME:-}
      INVITE_SMTP_PASSWORD: ${INVITE_SMTP_PASSWORD:-}
      INVITE_SENDGRID_API_KEY: ${INVITE_SENDGRID_API_KEY:-local-sendgrid-key}
      INVITE_SENDGRID_ENDPOINT: ${INVITE_SENDGRID_ENDPOINT:-http://mailhog-oauth:8026/sendgrid/v3/mail/send}
      INVITE_SENDGRID_TIMEOUT_MS: ${INVITE_SENDGRID_TIMEOUT_MS:-15000}
      INVITE_FROM: ${INVITE_FROM:-no-reply@invoice.local}
      INVITE_BASE_URL: ${INVITE_BASE_URL:-http://localhost:5177}
    volumes:
      - ${INVOICE_INBOX_PATH:-./sample-invoices/inbox}:/app/sample-invoices/inbox:ro
      - ./.local-run/artifacts:/app/.local-run/artifacts

  minio:
    image: minio/minio:latest
    container_name: billforge-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  minio-init:
    image: minio/mc:latest
    container_name: billforge-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/billforge-local;
      exit 0;
      "
    deploy:
      resources:
        limits:
          memory: 64M

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: billforge-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5177:80"
    deploy:
      resources:
        limits:
          memory: 128M

  mongo:
    image: mongo:7
    container_name: billforge-mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: billforge
      MONGO_INITDB_ROOT_USERNAME: billforge_root
      MONGO_INITDB_ROOT_PASSWORD: billforge_root_pass
    volumes:
      - mongo_data:/data/db
      - ./mongo/mongo-init.js:/docker-entrypoint-initdb.d/01-create-app-user.js:ro
    deploy:
      resources:
        limits:
          memory: 1G

  mongo-express:
    image: mongo-express:1.0.2
    container_name: billforge-mongo-express
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8181:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://billforge_root:billforge_root_pass@mongo:27017/?authSource=admin
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: billforge
    deploy:
      resources:
        limits:
          memory: 128M

  mailhog:
    image: axllent/mailpit:latest
    container_name: billforge-mailhog
    restart: unless-stopped
    ports:
      - "1125:1025"
      - "8125:8025"
    deploy:
      resources:
        limits:
          memory: 128M

  mailhog-oauth:
    build:
      context: .
      dockerfile: mailhog-oauth-wrapper/Dockerfile
    container_name: billforge-mailhog-oauth
    restart: unless-stopped
    depends_on:
      - mailhog
    ports:
      - "8126:8026"
    deploy:
      resources:
        limits:
          memory: 128M
    environment:
      PORT: "8026"
      MAILHOG_BASE_URL: http://mailhog:8025
      MAILHOG_SMTP_HOST: mailhog
      MAILHOG_SMTP_PORT: "1025"
      OAUTH_CLIENT_ID: ${EMAIL_OAUTH_CLIENT_ID:-mailhog-client}
      OAUTH_CLIENT_SECRET: ${EMAIL_OAUTH_CLIENT_SECRET:-mailhog-secret}
      OAUTH_REFRESH_TOKEN: ${EMAIL_OAUTH_REFRESH_TOKEN:-mailhog-refresh}
      OAUTH_ACCESS_TOKEN: ${EMAIL_OAUTH_ACCESS_TOKEN:-mailhog-access-token}
      OAUTH_XOAUTH2_USERNAME: ${EMAIL_USERNAME:-ap@example.com}
      OAUTH_TOKEN_EXPIRES_IN: "3600"
      SENDGRID_API_KEY: ${INVITE_SENDGRID_API_KEY:-local-sendgrid-key}

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: billforge-keycloak
    restart: unless-stopped
    command: start --import-realm --optimized=false
    ports:
      - "8280:8080"
    deploy:
      resources:
        limits:
          memory: 768M
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KC_HOSTNAME:-http://localhost:8280}
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "false"
      KC_DB: dev-file
      KC_LOG_LEVEL: ${KC_LOG_LEVEL:-info}
    volumes:
      - ./keycloak/realm-config.json:/opt/keycloak/data/import/realm-config.json:ro
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && timeout 2 cat <&3 | head -1 | grep -q 200"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  invoice-ocr:
    build:
      context: .
      dockerfile: invoice-ocr/Dockerfile
    container_name: billforge-invoice-ocr
    restart: unless-stopped
    ports:
      - "8202:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OCR_ENGINE: prod_http
      OCR_REMOTE_BASE_URL: ${OCR_REMOTE_BASE_URL:-http://host.docker.internal:8200/v1}
      OCR_PROBE_TIMEOUT_MS: "3000"
      OCR_VALIDATE_REMOTE_ON_STARTUP: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  invoice-slm:
    build:
      context: .
      dockerfile: invoice-slm/Dockerfile
    container_name: billforge-invoice-slm
    restart: unless-stopped
    ports:
      - "8302:8100"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SLM_ENGINE: prod_http
      SLM_REMOTE_BASE_URL: ${SLM_REMOTE_BASE_URL:-http://host.docker.internal:8300/v1}
      SLM_PROBE_TIMEOUT_MS: "3000"
      SLM_VALIDATE_REMOTE_ON_STARTUP: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  mongo_data:
  minio_data:
  keycloak_data:
