name: ledgerbuddy

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ledgerbuddy-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      mailhog-oauth:
        condition: service_started
      keycloak:
        condition: service_healthy
      minio:
        condition: service_healthy
      ocr:
        condition: service_started
      slm:
        condition: service_started
      redis:
        condition: service_started
      jaeger:
        condition: service_started
    env_file:
      - path: ./backend/.env.example
        required: true
      - path: ./backend/.env
        required: false
    ports:
      - "4100:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      ENV: ${ENV:-local}
      NODE_ENV: development
      PORT: "4000"
      MONGO_URI: mongodb://ledgerbuddy_app:ledgerbuddy_local_pass@mongo:27017/ledgerbuddy?authSource=ledgerbuddy
      APP_MANIFEST_PATH: ${APP_MANIFEST_PATH:-}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5177}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-ledgerbuddy-app}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-ledgerbuddy-local-secret}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email offline_access}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:5177/api/auth/callback}
      OIDC_AUTH_URL: ${OIDC_AUTH_URL:-http://localhost:8280/realms/ledgerbuddy/protocol/openid-connect/auth}
      OIDC_TOKEN_URL: ${OIDC_TOKEN_URL:-http://keycloak:8080/realms/ledgerbuddy/protocol/openid-connect/token}
      OIDC_VALIDATE_URL: ${OIDC_VALIDATE_URL:-http://keycloak:8080/realms/ledgerbuddy/protocol/openid-connect/token/introspect}
      OIDC_USERINFO_URL: ${OIDC_USERINFO_URL:-http://keycloak:8080/realms/ledgerbuddy/protocol/openid-connect/userinfo}
      KEYCLOAK_INTERNAL_BASE_URL: ${KEYCLOAK_INTERNAL_BASE_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-ledgerbuddy}
      AUTH_STATE_TTL_SECONDS: ${AUTH_STATE_TTL_SECONDS:-600}
      APP_SESSION_SIGNING_SECRET: ${APP_SESSION_SIGNING_SECRET:-local-dev-session-signing-secret-change-me}
      APP_SESSION_TTL_SECONDS: ${APP_SESSION_TTL_SECONDS:-28800}
      REFRESH_TOKEN_ENCRYPTION_SECRET: ${REFRESH_TOKEN_ENCRYPTION_SECRET:-local-dev-refresh-token-secret-32-chars}
      AUTH_AUTO_PROVISION_USERS: ${AUTH_AUTO_PROVISION_USERS:-true}
      PLATFORM_ADMIN_EMAILS: ${PLATFORM_ADMIN_EMAILS:-platform-admin@local.test}
      LOCAL_DEMO_SEED: ${LOCAL_DEMO_SEED:-true}
      LOCAL_DEMO_CONFIG_PATH: ${LOCAL_DEMO_CONFIG_PATH:-dev/config/local-demo-users.json}
      LOCAL_DEMO_INVOICES: ${LOCAL_DEMO_INVOICES:-true}
      INGESTION_SOURCES: ${INGESTION_SOURCES:-email}
      EMAIL_SOURCE_KEY: ${EMAIL_SOURCE_KEY:-email-inbox}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-imap}
      EMAIL_MAILHOG_API_BASE_URL: ${EMAIL_MAILHOG_API_BASE_URL:-http://mailhog-oauth:8026}
      EMAIL_HOST: ${EMAIL_HOST:-mailhog-oauth}
      EMAIL_PORT: ${EMAIL_PORT:-1143}
      EMAIL_SECURE: ${EMAIL_SECURE:-false}
      EMAIL_USERNAME: ${EMAIL_USERNAME:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_AUTH_MODE: ${EMAIL_AUTH_MODE:-password}
      EMAIL_OAUTH_CLIENT_ID: ${EMAIL_OAUTH_CLIENT_ID:-}
      EMAIL_OAUTH_CLIENT_SECRET: ${EMAIL_OAUTH_CLIENT_SECRET:-}
      EMAIL_OAUTH_REFRESH_TOKEN: ${EMAIL_OAUTH_REFRESH_TOKEN:-}
      EMAIL_OAUTH_ACCESS_TOKEN: ${EMAIL_OAUTH_ACCESS_TOKEN:-}
      EMAIL_OAUTH_TOKEN_ENDPOINT: ${EMAIL_OAUTH_TOKEN_ENDPOINT:-http://keycloak:8080/realms/ledgerbuddy/protocol/openid-connect/token}
      EMAIL_SIMULATION_SAMPLE_DIR: ${EMAIL_SIMULATION_SAMPLE_DIR:-/app/sample-invoices/inbox}
      EMAIL_MAILBOX: ${EMAIL_MAILBOX:-INBOX}
      EMAIL_FROM_FILTER: ${EMAIL_FROM_FILTER:-}
      GMAIL_OAUTH_CLIENT_ID: ${GMAIL_OAUTH_CLIENT_ID:-ledgerbuddy-app}
      GMAIL_OAUTH_CLIENT_SECRET: ${GMAIL_OAUTH_CLIENT_SECRET:-ledgerbuddy-local-secret}
      GMAIL_OAUTH_REDIRECT_URI: ${GMAIL_OAUTH_REDIRECT_URI:-http://localhost:4100/api/connect/gmail/callback}
      GMAIL_OAUTH_AUTH_URL: ${GMAIL_OAUTH_AUTH_URL:-https://accounts.google.com/o/oauth2/v2/auth}
      GMAIL_OAUTH_TOKEN_URL: ${GMAIL_OAUTH_TOKEN_URL:-https://oauth2.googleapis.com/token}
      GMAIL_OAUTH_USERINFO_URL: ${GMAIL_OAUTH_USERINFO_URL:-https://www.googleapis.com/oauth2/v3/userinfo}
      GMAIL_OAUTH_SCOPES: ${GMAIL_OAUTH_SCOPES:-openid email profile offline_access}
      GMAIL_OAUTH_STATE_TTL_SECONDS: ${GMAIL_OAUTH_STATE_TTL_SECONDS:-600}
      GMAIL_OAUTH_HTTP_TIMEOUT_MS: ${GMAIL_OAUTH_HTTP_TIMEOUT_MS:-15000}
      GMAIL_OAUTH_TOKEN_ENCRYPTION_SECRET: ${GMAIL_OAUTH_TOKEN_ENCRYPTION_SECRET:-local-dev-gmail-oauth-encryption-secret}
      GMAIL_OAUTH_SUCCESS_REDIRECT_URL: ${GMAIL_OAUTH_SUCCESS_REDIRECT_URL:-http://localhost:5177}
      GMAIL_OAUTH_FAILURE_REDIRECT_URL: ${GMAIL_OAUTH_FAILURE_REDIRECT_URL:-http://localhost:5177}
      OCR_PROVIDER: ${OCR_PROVIDER:-llamaparse}
      OCR_PROVIDER_BASE_URL: http://ocr:8000/v1
      OCR_MODEL: ${OCR_MODEL:-mlx-community/DeepSeek-OCR-4bit}
      LLAMA_CLOUD_API_KEY: ${LLAMA_CLOUD_API_KEY:-}
      LLAMA_PARSE_TIER: ${LLAMA_PARSE_TIER:-cost_effective}
      LLAMA_PARSE_EXTRACT_ENABLED: ${LLAMA_PARSE_EXTRACT_ENABLED:-true}
      LLAMA_PARSE_EXTRACT_TIER: ${LLAMA_PARSE_EXTRACT_TIER:-cost_effective}
      OCR_MAX_TOKENS: "768"
      OCR_TIMEOUT_MS: "3600000"
      # Default to 'none' when OCR_PROVIDER=llamaparse (which is itself the
      # default). LlamaExtract already emits field-level provenance, so the
      # HTTP SLM field verifier is redundant on that path. The backend also
      # auto-coerces this to 'none' when FIELD_VERIFIER_PROVIDER is unset and
      # OCR_PROVIDER=llamaparse — this default just keeps the compose env
      # tidy for the common case. Set FIELD_VERIFIER_PROVIDER=http to opt in.
      FIELD_VERIFIER_PROVIDER: ${FIELD_VERIFIER_PROVIDER:-none}
      FIELD_VERIFIER_BASE_URL: http://slm:8100/v1
      FIELD_VERIFIER_TIMEOUT_MS: ${FIELD_VERIFIER_TIMEOUT_MS:-180000}
      S3_FILE_STORE_BUCKET: ${S3_FILE_STORE_BUCKET:-ledgerbuddy-local}
      S3_FILE_STORE_REGION: ${S3_FILE_STORE_REGION:-us-east-1}
      S3_FILE_STORE_PREFIX: ${S3_FILE_STORE_PREFIX:-ledgerbuddy}
      S3_FILE_STORE_ENDPOINT: ${S3_FILE_STORE_ENDPOINT:-http://minio:9000}
      S3_FILE_STORE_PUBLIC_ENDPOINT: ${S3_FILE_STORE_PUBLIC_ENDPOINT:-http://localhost:9100}
      S3_FILE_STORE_FORCE_PATH_STYLE: ${S3_FILE_STORE_FORCE_PATH_STYLE:-true}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      TALLY_ENDPOINT: http://tally.example.local
      TALLY_COMPANY: Demo Company
      TALLY_PURCHASE_LEDGER: Purchase
      TALLY_CGST_LEDGER: ${TALLY_CGST_LEDGER:-Input CGST}
      TALLY_SGST_LEDGER: ${TALLY_SGST_LEDGER:-Input SGST}
      TALLY_IGST_LEDGER: ${TALLY_IGST_LEDGER:-Input IGST}
      TALLY_CESS_LEDGER: ${TALLY_CESS_LEDGER:-Input Cess}
      INVITE_EMAIL_PROVIDER: ${INVITE_EMAIL_PROVIDER:-sendgrid}
      INVITE_SMTP_HOST: ${INVITE_SMTP_HOST:-mailhog}
      INVITE_SMTP_PORT: ${INVITE_SMTP_PORT:-1025}
      INVITE_SMTP_SECURE: ${INVITE_SMTP_SECURE:-false}
      INVITE_SMTP_USERNAME: ${INVITE_SMTP_USERNAME:-}
      INVITE_SMTP_PASSWORD: ${INVITE_SMTP_PASSWORD:-}
      INVITE_SENDGRID_API_KEY: ${INVITE_SENDGRID_API_KEY:-local-sendgrid-key}
      INVITE_SENDGRID_ENDPOINT: ${INVITE_SENDGRID_ENDPOINT:-http://mailhog-oauth:8026/sendgrid/v3/mail/send}
      INVITE_SENDGRID_TIMEOUT_MS: ${INVITE_SENDGRID_TIMEOUT_MS:-15000}
      INVITE_FROM: ${INVITE_FROM:-no-reply@invoice.local}
      INVITE_BASE_URL: ${INVITE_BASE_URL:-http://localhost:5177}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
    volumes:
      - ./.local-run/artifacts:/app/.local-run/artifacts

  redis:
    image: redis:7-alpine
    container_name: ledgerbuddy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 128M

  minio:
    image: minio/minio:latest
    container_name: ledgerbuddy-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  minio-init:
    image: minio/mc:latest
    container_name: ledgerbuddy-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/ledgerbuddy-local;
      exit 0;
      "
    deploy:
      resources:
        limits:
          memory: 64M

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: ledgerbuddy-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5177:80"
    deploy:
      resources:
        limits:
          memory: 128M

  mongo:
    image: mongo:7
    container_name: ledgerbuddy-mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: ledgerbuddy
      MONGO_INITDB_ROOT_USERNAME: ledgerbuddy_root
      MONGO_INITDB_ROOT_PASSWORD: ledgerbuddy_root_pass
    volumes:
      - mongo_data:/data/db
      - ./infra/mongo/mongo-init.js:/docker-entrypoint-initdb.d/01-create-app-user.js:ro
    deploy:
      resources:
        limits:
          memory: 1G

  mongo-express:
    image: mongo-express:1.0.2
    container_name: ledgerbuddy-mongo-express
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8181:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://ledgerbuddy_root:ledgerbuddy_root_pass@mongo:27017/?authSource=admin
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: ledgerbuddy
    deploy:
      resources:
        limits:
          memory: 128M

  mailhog:
    image: axllent/mailpit:latest
    container_name: ledgerbuddy-mailhog
    restart: unless-stopped
    ports:
      - "1125:1025"
      - "8125:8025"
    deploy:
      resources:
        limits:
          memory: 128M

  mailhog-oauth:
    build:
      context: .
      dockerfile: infra/mailhog/Dockerfile
    container_name: ledgerbuddy-mailhog-oauth
    restart: unless-stopped
    depends_on:
      - mailhog
    ports:
      - "8126:8026"
    deploy:
      resources:
        limits:
          memory: 128M
    environment:
      PORT: "8026"
      MAILHOG_BASE_URL: http://mailhog:8025
      MAILHOG_SMTP_HOST: mailhog
      MAILHOG_SMTP_PORT: "1025"
      OAUTH_CLIENT_ID: ${EMAIL_OAUTH_CLIENT_ID:-mailhog-client}
      OAUTH_CLIENT_SECRET: ${EMAIL_OAUTH_CLIENT_SECRET:-mailhog-secret}
      OAUTH_REFRESH_TOKEN: ${EMAIL_OAUTH_REFRESH_TOKEN:-mailhog-refresh}
      OAUTH_ACCESS_TOKEN: ${EMAIL_OAUTH_ACCESS_TOKEN:-mailhog-access-token}
      OAUTH_XOAUTH2_USERNAME: ${EMAIL_USERNAME:-ap@example.com}
      OAUTH_TOKEN_EXPIRES_IN: "3600"
      SENDGRID_API_KEY: ${INVITE_SENDGRID_API_KEY:-local-sendgrid-key}

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: ledgerbuddy-keycloak
    restart: unless-stopped
    command: start --import-realm --optimized=false
    ports:
      - "8280:8080"
    deploy:
      resources:
        limits:
          memory: 768M
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KC_HOSTNAME:-http://localhost:8280}
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "false"
      KC_DB: dev-file
      KC_LOG_LEVEL: ${KC_LOG_LEVEL:-info}
    volumes:
      - ./infra/keycloak/realm-config.json:/opt/keycloak/data/import/realm-config.json:ro
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && timeout 2 cat <&3 | head -1 | grep -q 200"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  ocr:
    build:
      context: .
      dockerfile: ai/ocr/Dockerfile
    container_name: ledgerbuddy-ocr
    restart: unless-stopped
    ports:
      - "8202:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OCR_ENGINE: prod_http
      OCR_REMOTE_BASE_URL: ${OCR_REMOTE_BASE_URL:-http://host.docker.internal:8200/v1}
      OCR_PROBE_TIMEOUT_MS: "3000"
      OCR_VALIDATE_REMOTE_ON_STARTUP: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  slm:
    build:
      context: .
      dockerfile: ai/slm/Dockerfile
    container_name: ledgerbuddy-slm
    restart: unless-stopped
    ports:
      - "8302:8100"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SLM_ENGINE: prod_http
      SLM_REMOTE_BASE_URL: ${SLM_REMOTE_BASE_URL:-http://host.docker.internal:8300}
      SLM_MAX_NEW_TOKENS: ${SLM_MAX_NEW_TOKENS:-4500}
      SLM_REMOTE_TIMEOUT_MS: ${SLM_REMOTE_TIMEOUT_MS:-600000}
      SLM_PROBE_TIMEOUT_MS: "3000"
      SLM_VALIDATE_REMOTE_ON_STARTUP: "false"
      SLM_EXTRACTION_PIPELINE: ${SLM_EXTRACTION_PIPELINE:-single_verify}
      SLM_MULTI_STEP_EXTRACTION: ${SLM_MULTI_STEP_EXTRACTION:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: ledgerbuddy-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  mongo_data:
  minio_data:
  keycloak_data:
