services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: invoice-processor-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      deepseek-ocr:
        condition: service_healthy
      slm-verifier:
        condition: service_healthy
    env_file:
      - path: ./backend/.env.example
        required: true
      - path: ./backend/.env
        required: false
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: "4000"
      APP_MANIFEST_PATH: /app/backend/runtime-manifest.local.json
      MONGO_URI: mongodb://mongo:27017/invoice_processor
      INGESTION_SOURCES: folder
      FOLDER_SOURCE_KEY: local-folder
      FOLDER_SOURCE_PATH: /app/sample-invoices/inbox
      FOLDER_RECURSIVE: "false"
      DEEPSEEK_BASE_URL: http://deepseek-ocr:8000/v1
      DEEPSEEK_OCR_MODEL: deepseek-ai/DeepSeek-OCR
      DEEPSEEK_TIMEOUT_MS: "3600000"
      OCR_HIGH_CONFIDENCE_THRESHOLD: "0.88"
      FIELD_VERIFIER_PROVIDER: http
      FIELD_VERIFIER_BASE_URL: http://slm-verifier:8100/v1
      FIELD_VERIFIER_TIMEOUT_MS: "20000"
      CONFIDENCE_EXPECTED_MAX_TOTAL: "100000"
      CONFIDENCE_EXPECTED_MAX_DUE_DAYS: "90"
      CONFIDENCE_AUTO_SELECT_MIN: "91"
      TALLY_ENDPOINT: http://tally.example.local
      TALLY_COMPANY: Demo Company
      TALLY_PURCHASE_LEDGER: Purchase
    volumes:
      - ./sample-invoices/inbox:/app/sample-invoices/inbox

  deepseek-ocr:
    build:
      context: .
      dockerfile: deepseek-ocr/Dockerfile
    container_name: invoice-processor-deepseek-ocr
    restart: unless-stopped
    environment:
      OCR_MODEL_ID: ${OCR_MODEL_ID:-deepseek-ai/DeepSeek-OCR}
      OCR_DEVICE: ${OCR_DEVICE:-cpu}
      OCR_TORCH_DTYPE: ${OCR_TORCH_DTYPE:-bfloat16}
      OCR_MAX_NEW_TOKENS: ${OCR_MAX_NEW_TOKENS:-512}
      OCR_LOAD_ON_STARTUP: ${OCR_LOAD_ON_STARTUP:-false}
    volumes:
      - deepseek_ocr_cache:/models
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  slm-verifier:
    build:
      context: .
      dockerfile: slm-verifier/Dockerfile
    container_name: invoice-processor-slm-verifier
    restart: unless-stopped
    ports:
      - "8100:8100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000/api
    container_name: invoice-processor-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  mongo:
    image: mongo:7
    container_name: invoice-processor-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: invoice_processor
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    container_name: invoice-processor-mongo-express
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH: "false"

volumes:
  mongo_data:
  deepseek_ocr_cache:
