name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-typecheck:
    name: Backend Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn workspace billforge-backend run build

  backend-test:
    name: Backend Unit Tests
    needs: backend-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mongo:
        image: mongo:7
        ports:
          - 27018:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ENV: local
      MONGO_URI: mongodb://127.0.0.1:27018/billforge_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - name: Run unit tests with coverage
        run: yarn workspace billforge-backend run coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  backend-knip:
    name: Backend Dead Code Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn run knip

  frontend-typecheck:
    name: Frontend Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - name: TypeScript type check
        run: yarn workspace billforge-frontend exec tsc --noEmit

  frontend-build:
    name: Frontend Build
    needs: frontend-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn workspace billforge-frontend run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  frontend-test:
    name: Frontend Unit Tests
    needs: frontend-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - name: Run frontend tests
        run: yarn workspace billforge-frontend run test

  python-ocr-check:
    name: OCR Service Check
    runs-on: ubuntu-latest
    env:
      OCR_ENGINE: prod_http
      OCR_REMOTE_BASE_URL: http://localhost:8200/v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r ocr/requirements.base.txt
          pip install -r ocr/requirements.prod.txt
      - name: Syntax check all Python files
        run: find ocr/app -name '*.py' -exec python -m py_compile {} +
      - name: Verify prod_http provider imports
        run: |
          cd ocr
          python -c "from app.providers.http.provider import ProdHttpOCRProvider; print('OCR prod_http OK')"
          python -c "from app.engine import estimate_confidence, parse_data_url; print('OCR engine OK')"
          python -c "from app.schemas import OcrDocumentRequest; print('OCR schemas OK')"

  python-slm-check:
    name: SLM Service Check
    runs-on: ubuntu-latest
    env:
      SLM_ENGINE: prod_http
      SLM_REMOTE_BASE_URL: http://localhost:8300/v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r slm/requirements.base.txt
          pip install -r slm/requirements.prod.txt
      - name: Syntax check all Python files
        run: find slm/app -name '*.py' -exec python -m py_compile {} +
      - name: Verify prod_http provider imports
        run: |
          cd slm
          python -c "from app.providers.http.provider import ProdHttpLLMProvider; print('SLM prod_http OK')"
          python -c "from app.engine import select_with_fallback; print('SLM engine OK')"
          python -c "from app.schemas import VerifyInvoiceRequest, VerifyInvoiceResponse; print('SLM schemas OK')"

  docker-build:
    name: Docker Build (${{ matrix.service }})
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            dockerfile: backend/Dockerfile
          - service: frontend
            dockerfile: frontend/Dockerfile
          - service: ocr
            dockerfile: ocr/Dockerfile
          - service: slm
            dockerfile: slm/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: billforge-${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: billforge-${{ matrix.service }}:ci-${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
