const prev = DATA.length > 1 ? DATA[DATA.length - 2] : null;

function fmt(n) { return n.toLocaleString(); }
function delta(cur, old) {
  if (!old) return '';
  const d = cur - old;
  const pct = old > 0 ? ((d / old) * 100).toFixed(1) : '0.0';
  const sign = d >= 0 ? '+' : '';
  const cls = d >= 0 ? 'positive' : 'negative';
  return `<div class="stat-delta ${cls}">${sign}${fmt(d)} (${sign}${pct}%)</div>`;
}

    <div class="stat-value total">${fmt(latest.total)}</div>

`;
