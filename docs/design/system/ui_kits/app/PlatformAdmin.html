<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LedgerBuddy — Platform Admin</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" />
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="app.css" />
<link rel="stylesheet" href="Login.css" />
<link rel="stylesheet" href="PlatformAdmin.css" />
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Login.jsx"></script>
<script type="text/babel" src="PlatformAdmin.jsx"></script>
<script type="text/babel" src="PlatformAdminParts1.jsx"></script>
<script type="text/babel" src="PlatformAdminParts2.jsx"></script>
<script type="text/babel" src="PlatformAdminApp.jsx"></script>
<script type="text/babel">
function Root() {
  const [theme, setTheme] = React.useState(() => localStorage.getItem("lb-theme") || "light");
  const [auth, setAuth] = React.useState(false);
  const [authState, setAuthState] = React.useState("signin");
  const dark = theme === "dark";
  React.useEffect(() => {
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    localStorage.setItem("lb-theme", theme);
  }, [theme, dark]);
  if (!auth) {
    return <Login state={authState} onAuthenticated={(role) => {
      if (role === "tenant") { window.location.href = "index.html"; return; }
      setAuth(true); setAuthState("signin");
    }} onSetState={setAuthState} />;
  }
  return <PlatformAdminApp dark={dark} onToggleTheme={() => setTheme(t => t === "dark" ? "light" : "dark")} onSwitchToTenant={() => { window.location.href = "index.html"; }} />;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
